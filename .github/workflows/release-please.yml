name: Release Please

# Controls when the workflow will run
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # https://github.com/googleapis/release-please-action/commit/16a9c90856f42705d54a6fda1823352bdc62cf38
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          # Use manifest-driven release configuration
          # Config file: release-please-config.json
          # Manifest file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      # The following steps run only when a release is created
      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 24.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: | # Install and link dependencies
          npm ci
      - name: Build
        if: ${{ steps.release.outputs.release_created }}
        run: |
          npm run build
      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        run: npm publish --access public
